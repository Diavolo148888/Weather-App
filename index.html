<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baler Sky & Surf Monitor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* Dynamic Backgrounds */
        body { 
            min-height: 100vh; display: flex; justify-content: center; align-items: center; 
            color: white; transition: all 1.5s ease; padding: 20px;
            background: #1a1a2e; /* Default */
        }

        .container {
            background: rgba(0, 0, 0, 0.3);
            padding: 2rem; border-radius: 35px;
            backdrop-filter: blur(15px);
            box-shadow: 0 15px 50px rgba(0,0,0,0.5);
            width: 100%; max-width: 480px; text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .surf-badge {
            display: inline-block; padding: 8px 15px; border-radius: 20px;
            font-size: 0.8rem; font-weight: bold; text-transform: uppercase;
            margin-bottom: 10px; letter-spacing: 1px;
        }

        .temp { font-size: 4.5rem; font-weight: 800; margin: 5px 0; letter-spacing: -2px; }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
        .stat-card { background: rgba(255, 255, 255, 0.1); padding: 15px; border-radius: 20px; }
        .stat-card p { font-size: 0.7rem; opacity: 0.7; text-transform: uppercase; margin-bottom: 4px; }
        .stat-card span { display: block; font-size: 1.1rem; font-weight: bold; }

        .tip-box { 
            margin: 15px 0; padding: 15px; background: rgba(255, 255, 255, 0.15); 
            border-radius: 15px; border-left: 6px solid #4ecca3; font-size: 0.9rem; font-weight: 500;
        }

        button { 
            width: 100%; padding: 16px; border-radius: 50px; border: none; 
            font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px;
            text-transform: uppercase; font-size: 0.8rem;
        }

        .btn-refresh { background: #4ecca3; color: #1a1a2e; }
        .btn-timer { background: #ff9f43; color: white; }
        .btn-test { background: rgba(255,255,255,0.2); color: white; margin-top: 5px; font-size: 0.7rem; padding: 8px; }

        /* Theme Overrides */
        .theme-day { background: linear-gradient(180deg, #4facfe 0%, #00f2fe 100%); color: #003366; }
        .theme-sunset { background: linear-gradient(180deg, #ff8c00 0%, #ed4264 100%); }
        .theme-night { background: linear-gradient(180deg, #0f2027 0%, #203a43 50%, #2c5364 100%); }
        .theme-storm { background: linear-gradient(180deg, #373b44 0%, #4286f4 100%); animation: flash 5s infinite; }
        
        @keyframes flash { 0%, 90%, 100% { opacity: 1; } 95% { opacity: 0.8; } }
    </style>
</head>
<body id="mainBody">

    <div class="container">
        <div id="surfStatus" class="surf-badge" style="background: #4ecca3;">Analyzing Waves...</div>
        
        <h1 style="font-size: 1.4rem;">Baler, Philippines</h1>
        <p id="dateTime" style="opacity: 0.7; font-size: 0.7rem; margin-bottom: 10px;"></p>

        <div id="temp" class="temp">--°C</div>
        <div id="cloudPrediction" style="font-weight: bold; font-size: 1.2rem;">Syncing...</div>
        
        <div class="tip-box" id="tip">Getting local tips for you...</div>

        <div class="stat-grid">
            <div class="stat-card"><p>Cloudiness</p><span id="clouds">--%</span></div>
            <div class="stat-card"><p>Wind Speed</p><span id="wind">-- km/h</span></div>
            <div class="stat-card"><p>Humidity</p><span id="humidity">--%</span></div>
            <div class="stat-card"><p>Moon</p><span id="moon" style="font-size: 0.8rem;">--</span></div>
        </div>

        <button class="btn-refresh" onclick="getBalerWeather()">Update Live Data</button>
        <button class="btn-timer" onclick="startSunTimer()">Start Sunscreen Timer (2h)</button>
        <button class="btn-test" onclick="testNotif()">Test Notification Popup</button>
        
        <p style="font-size: 0.6rem; opacity: 0.5; margin-top: 15px;">Auto-Sync Every 60s • HTTPS Secure</p>
    </div>

    <script>
        const apiKey = "084cee246bd0e5b348128881ea756965"; 
        const city = "Baler,PH";

        // 1. Initial Permission
        if ("Notification" in window) { Notification.requestPermission(); }

        function testNotif() {
            Notification.requestPermission().then(perm => {
                if (perm === "granted") new Notification("Baler Sky Monitor", { body: "Notifications are working! ✅" });
                else alert("Please enable notifications in your browser settings!");
            });
        }

        function triggerNotification(title, message) {
            if ("Notification" in window && Notification.permission === "granted") {
                new Notification(title, { body: message, tag: 'baler-update' });
            }
        }

        function startSunTimer() {
            alert("Sunscreen timer started! We'll remind you in 2 hours. 🧴");
            setTimeout(() => {
                triggerNotification("Sunscreen Alert! 🧴", "2 hours have passed. Time to re-apply sunscreen to protect yourself from the Baler sun!");
            }, 7200000); 
        }

        function updateTheme() {
            const hour = new Date().getHours();
            const body = document.getElementById('mainBody');
            body.className = ''; // Reset

            if (hour >= 6 && hour < 16) body.classList.add('theme-day');
            else if (hour >= 16 && hour < 19) body.classList.add('theme-sunset');
            else body.classList.add('theme-night');
        }

        function getMoonPhase() {
            const date = new Date();
            const lp = 2551443; 
            const new_moon = new Date(1970, 0, 7, 20, 35, 0);
            const phase = ((date.getTime() - new_moon.getTime()) / 1000) % lp;
            const res = Math.floor((phase / (24 * 3600)) + 1);
            if (res <= 1) return "New Moon 🌑";
            if (res <= 16) return "Full Moon 🌕";
            return "Visible Moon 🌙";
        }

        async function getBalerWeather() {
            updateTheme();
            document.getElementById('dateTime').innerText = new Date().toLocaleString();
            
            try {
                const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${apiKey}`);
                if (!response.ok) throw new Error("API Error");
                const data = await response.json();

                const clouds = data.clouds.all;
                const temp = Math.round(data.main.temp);
                const wind = data.wind.speed;
                const humidity = data.main.humidity;
                const weather = data.weather[0].main;

                // --- UNIQUE FEATURE: SURF LOGIC ---
                const surfBadge = document.getElementById('surfStatus');
                if (wind < 15 && weather !== "Rain") {
                    surfBadge.innerText = "Surf Status: GO! 🏄‍♂️";
                    surfBadge.style.background = "#4ecca3";
                } else {
                    surfBadge.innerText = "Surf Status: CAUTION 🚩";
                    surfBadge.style.background = "#ff4e4e";
                }

                // --- UNIQUE FEATURE: STORM MODE ---
                if (wind > 30 || weather === "Thunderstorm") {
                    document.getElementById('mainBody').className = 'theme-storm';
                    triggerNotification("STORM ALERT ⚠️", "High winds detected in Baler. Secure your belongings!");
                }

                // Weather Tips
                let tip = "";
                if (weather === "Rain") tip = "Rainy day at Sabang. Bring an umbrella! ☂️";
                else if (temp > 30) tip = "It's hot! Drink coconut water and stay hydrated. 🥥";
                else tip = "Visibility is great for a hike at Ermita Hill! ⛰️";

                // Update UI
                document.getElementById('temp').innerText = temp + "°C";
                document.getElementById('cloudPrediction').innerText = weather + (clouds > 70 ? " ☁️" : " ☀️");
                document.getElementById('clouds').innerText = clouds + "%";
                document.getElementById('wind').innerText = wind + " km/h";
                document.getElementById('humidity').innerText = humidity + "%";
                document.getElementById('moon').innerText = getMoonPhase();
                document.getElementById('tip').innerText = "PRO TIP: " + tip;

                triggerNotification(`Baler: ${temp}°C`, tip);

            } catch (e) {
                document.getElementById('cloudPrediction').innerText = "Sync Offline";
            }
        }

        getBalerWeather();
        setInterval(getBalerWeather, 60000); // 1-minute auto-refresh
    </script>
</body>
</html>
