<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baler Sky Monitor (Pro)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { 
            background: #1a1a2e; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; color: white; transition: background 0.8s ease;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 2rem; border-radius: 30px;
            backdrop-filter: blur(20px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.6);
            width: 100%; max-width: 450px; text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .temp { font-size: 4rem; font-weight: bold; margin: 5px 0; }
        .stat-grid { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0;
        }
        .stat-card {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px; border-radius: 15px;
        }
        .stat-card p { font-size: 0.8rem; opacity: 0.8; text-transform: uppercase; }
        .stat-card span { display: block; font-size: 0.95rem; font-weight: bold; margin-top: 5px; }
        .tip-box {
            margin: 20px 0; padding: 15px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 15px; font-weight: 500; border-left: 5px solid #4ecca3;
            font-size: 0.9rem; text-align: left;
        }
        button { 
            width: 100%; padding: 15px; border-radius: 50px; 
            border: none; background: #4ecca3; color: white; 
            cursor: pointer; font-weight: bold; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Baler, Aurora</h1>
        <p id="dateTime" style="opacity: 0.7; font-size: 0.7rem; margin-top: 5px;"></p>

        <div id="temp" class="temp">--°C</div>
        <div id="cloudPrediction" style="font-size: 1.1rem; color: #4ecca3; font-weight: bold; text-transform: capitalize;">Syncing...</div>
        
        <div class="tip-box" id="tip">Connecting to WeatherAPI...</div>

        <div class="stat-grid">
            <div class="stat-card">
                <p>Cloudiness</p>
                <span id="clouds">--%</span>
            </div>
            <div class="stat-card">
                <p>Moon Phase</p>
                <span id="moon">--</span>
            </div>
            <div class="stat-card">
                <p>Humidity</p>
                <span id="humidity">--%</span>
            </div>
            <div class="stat-card">
                <p>Wind Speed</p>
                <span id="wind">-- km/h</span>
            </div>
        </div>

        <button onclick="getBaler()">Update Live Data</button>
        <p style="font-size: 0.6rem; opacity: 0.5; margin-top: 15px;">Powered by WeatherAPI • 15 minutes Auto-Sync</p>
    </div>

    <script>
        // PASTE YOUR KEY FROM WEATHERAPI.COM BELOW
        const apiKey = "58ba2d5e4a54464f92f51820260203 "; 
        const city = "Baler";

        if ("Notification" in window) {
            Notification.requestPermission();
        }

        function triggerNotification(title, message) {
            if (Notification.permission === "granted") {
                new Notification(title, { body: message, tag: 'baler-update' });
            }
        }

        async function getBalerWeather() {
            document.getElementById('dateTime').innerText = "Last update: " + new Date().toLocaleTimeString();
            
            try {
                // Fetching both weather and astronomy data in one go via forecast endpoint
                const response = await fetch(`https://api.weatherapi.com/v1/forecast.json?key=${apiKey}&q=${city}&days=1&aqi=no&alerts=no`);
                
                if (!response.ok) throw new Error("API Key Invalid or Network Error");
                
                const data = await response.json();

                // Mapping WeatherAPI data to variables
                const tempC = Math.round(data.current.temp_c);
                const clouds = data.current.cloud;
                const humidity = data.current.humidity;
                const windKph = data.current.wind_kph;
                const condition = data.current.condition.text;
                
                // Fetching accurate Moon Phase from astronomy data
                const moonPhase = data.forecast.forecastday[0].astro.moon_phase;

                let safetyTip = "";
                if (clouds > 70 || condition.toLowerCase().includes("rain")) {
                    safetyTip = "Chance of rain in Baler. Keep your gear dry! ☂️";
                } else if (tempC > 31) {
                    safetyTip = "It's a hot one! Perfect for surfing, but wear sunscreen. 🧴";
                } else {
                    safetyTip = "Weather is steady. Great time to explore Ermita Hill! ⛰️";
                }

                // Update the User Interface
                document.getElementById('temp').innerText = tempC + "°C";
                document.getElementById('cloudPrediction').innerText = condition;
                document.getElementById('clouds').innerText = clouds + "%";
                document.getElementById('moon').innerText = moonPhase;
                document.getElementById('humidity').innerText = humidity + "%";
                document.getElementById('wind').innerText = windKph + " km/h";
                document.getElementById('tip').innerText = "SAFETY TIP: " + safetyTip;

                // Visual Feedback: Darker background if it's cloudy
                document.body.style.background = (clouds > 60) ? "#2c3e50" : "#1a1a2e";

                triggerNotification(`Baler Update: ${tempC}°C`, safetyTip);

            } catch (err) {
                console.error(err);
                document.getElementById('cloudPrediction').innerText = "API Error";
                document.getElementById('tip').innerText = "Please check if your WeatherAPI Key is correct.";
            }
        }

        // Initial call and set interval
        getBalerWeather();
        setInterval(getBalerWeather, 900000);
    </script>
</body>
</html>
