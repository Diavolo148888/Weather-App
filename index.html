<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baler Sky Monitor - Live Alerts</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { 
            background: #1a1a2e; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; color: white; transition: background 0.8s ease;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 2rem; border-radius: 30px;
            backdrop-filter: blur(20px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.6);
            width: 100%; max-width: 450px; text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .temp { font-size: 4rem; font-weight: bold; margin: 5px 0; }
        .stat-grid { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0;
        }
        .stat-card {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px; border-radius: 15px;
        }
        .stat-card p { font-size: 0.8rem; opacity: 0.8; text-transform: uppercase; }
        .stat-card span { display: block; font-size: 1.1rem; font-weight: bold; margin-top: 5px; }
        .tip-box {
            margin: 20px 0; padding: 15px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 15px; font-weight: 500; border-left: 5px solid #4ecca3;
            font-size: 0.9rem;
        }
        button { 
            width: 100%; padding: 15px; border-radius: 50px; 
            border: none; background: #4ecca3; color: white; 
            cursor: pointer; font-weight: bold; text-transform: uppercase;
            letter-spacing: 1px; transition: 0.3s;
        }
        button:hover { background: #45b291; transform: translateY(-2px); }
        .refresh-tag { font-size: 0.7rem; opacity: 0.5; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Baler, Aurora</h1>
            <p id="dateTime" style="opacity: 0.7; font-size: 0.8rem; margin-top: 5px;"></p>
        </div>

        <div id="temp" class="temp">--°C</div>
        <div id="cloudPrediction" style="font-size: 1.2rem; color: #4ecca3; font-weight: bold;">Syncing...</div>
        <p id="description" style="text-transform: capitalize; font-size: 0.9rem; opacity: 0.8;">--</p>
        
        <div class="tip-box" id="tip">Checking conditions...</div>

        <div class="stat-grid">
            <div class="stat-card">
                <p>Cloudiness</p>
                <span id="clouds">--%</span>
            </div>
            <div class="stat-card">
                <p>Moon Phase</p>
                <span id="moon">--</span>
            </div>
            <div class="stat-card">
                <p>Humidity</p>
                <span id="humidity">--%</span>
            </div>
            <div class="stat-card">
                <p>Wind Speed</p>
                <span id="wind">-- km/h</span>
            </div>
        </div>

        <button onclick="getBalerWeather()">Refresh Now</button>
        <p class="refresh-tag">Auto-updating every 60 seconds</p>
    </div>

    <script>
        const apiKey = "084cee246bd0e5b348128881ea756965"; 
        const city = "Baler,PH";

        // Request Permission
        if ("Notification" in window) {
            Notification.requestPermission().then(permission => {
                if (permission === "granted") {
                    console.log("Notifications enabled!");
                }
            });
        }

        function triggerNotification(title, message) {
            if (Notification.permission === "granted") {
                new Notification(title, { 
                    body: message,
                    tag: 'weather-update' // This keeps the notification unique but prevents stacking 100 separate bubbles
                });
            }
        }

        function getMoonPhase() {
            const date = new Date();
            const lp = 2551443; 
            const new_moon = new Date(1970, 0, 7, 20, 35, 0);
            const phase = ((date.getTime() - new_moon.getTime()) / 1000) % lp;
            const res = Math.floor((phase / (24 * 3600)) + 1);
            
            if (res <= 1) return "New Moon 🌑";
            if (res <= 6) return "Waxing Crescent 🌒";
            if (res <= 9) return "First Quarter 🌓";
            if (res <= 13) return "Waxing Gibbous 🌔";
            if (res <= 16) return "Full Moon 🌕";
            if (res <= 21) return "Waning Gibbous 🌖";
            if (res <= 24) return "Last Quarter 🌗";
            return "Waning Crescent 🌘";
        }

        async function getBalerWeather() {
            document.getElementById('dateTime').innerText = "Last sync: " + new Date().toLocaleTimeString();
            
            try {
                const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${apiKey}`);
                const data = await response.json();

                const clouds = data.clouds.all;
                const temp = Math.round(data.main.temp);
                const humidity = data.main.humidity;
                const wind = data.wind.speed;
                const weatherMain = data.weather[0].main;
                
                let prediction = "";
                let tip = "";

                // --- WEATHER LOGIC & TIPS ---
                if (weatherMain === "Rain" || clouds >= 80) {
                    prediction = "Rainy / Overcast 🌧️";
                    tip = "SAFETY TIP: Heavy rain possible in Baler. Bring an umbrella TODAY! ☂️";
                } 
                else if (clouds < 20) {
                    prediction = "Perfectly Sunny ☀️";
                    tip = "SAFETY TIP: Bright sun today! Wear sunscreen and drink plenty of water. 🧴";
                } 
                else if (wind > 20) {
                    prediction = "Breezy/Windy 💨";
                    tip = "SAFETY TIP: It's a bit windy. Hold onto your hat if you're out surfing! 🚩";
                }
                else {
                    prediction = "Normal / Cloudy 🌤️";
                    tip = "SAFETY TIP: Great day to enjoy Baler! Stay safe and keep an eye on the sky. 🚶";
                }

                // Send Notification every 1 minute
                triggerNotification(`Baler Sky: ${temp}°C`, tip);

                // UI Updates
                document.getElementById('temp').innerText = temp + "°C";
                document.getElementById('cloudPrediction').innerText = prediction;
                document.getElementById('clouds').innerText = clouds + "%";
                document.getElementById('moon').innerText = getMoonPhase();
                document.getElementById('humidity').innerText = humidity + "%";
                document.getElementById('wind').innerText = wind + " km/h";
                document.getElementById('description').innerText = "Currently: " + data.weather[0].description;
                document.getElementById('tip').innerText = tip;

                // Background shift
                document.body.style.background = (clouds > 70) ? "#37474f" : "#1a1a2e";

            } catch (err) {
                document.getElementById('cloudPrediction').innerText = "Sync Error";
            }
        }

        // Run immediately
        getBalerWeather();

        // AUTO REFRESH: Run every 1 minute (60,000 ms)
        setInterval(getBalerWeather, 60000);

    </script>
</body>
</html>
