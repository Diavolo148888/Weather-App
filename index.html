<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baler Sky Monitor (Pro)</title>
    <style>
        /* --- THIS SECTION FIXES THE UI --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        body { 
            background: #1a1a2e; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; color: white; transition: background 1.2s ease;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 2.5rem; border-radius: 35px;
            backdrop-filter: blur(25px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.7);
            width: 100%; max-width: 450px; text-align: center;
            border: 1px solid rgba(255,255,255,0.15);
        }

        h1 { font-size: 1.8rem; margin-bottom: 5px; letter-spacing: 1px; }

        .temp { font-size: 5rem; font-weight: 800; margin: 10px 0; letter-spacing: -3px; }

        #cloudPrediction { 
            font-size: 1.2rem; color: #4ecca3; font-weight: 700; 
            text-transform: capitalize; margin-bottom: 15px; 
        }

        .stat-grid { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 25px 0;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.25);
            padding: 18px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .stat-card p { font-size: 0.75rem; opacity: 0.7; text-transform: uppercase; margin-bottom: 5px; }
        .stat-card span { display: block; font-size: 1rem; font-weight: 700; }

        .tip-box {
            margin: 20px 0; padding: 18px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 18px; font-weight: 500; border-left: 6px solid #4ecca3;
            font-size: 0.95rem; text-align: left; line-height: 1.4;
        }

        button { 
            width: 100%; padding: 16px; border-radius: 50px; 
            border: none; background: #4ecca3; color: #1a1a2e; 
            cursor: pointer; font-weight: 800; text-transform: uppercase;
            transition: transform 0.2s, background 0.3s;
        }

        button:active { transform: scale(0.98); }

        .footer-text { font-size: 0.65rem; opacity: 0.5; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Baler, Aurora</h1>
        <p id="dateTime" style="opacity: 0.7; font-size: 0.75rem;"></p>

        <div id="temp" class="temp">--°C</div>
        <div id="cloudPrediction">Syncing...</div>
        
        <div class="tip-box" id="tip">Initializing Baler Weather Station...</div>

        <div class="stat-grid">
            <div class="stat-card">
                <p>Cloudiness</p>
                <span id="clouds">--%</span>
            </div>
            <div class="stat-card">
                <p>Moon Phase</p>
                <span id="moon">--</span>
            </div>
            <div class="stat-card">
                <p>Humidity</p>
                <span id="humidity">--%</span>
            </div>
            <div class="stat-card">
                <p>Wind Speed</p>
                <span id="wind">-- km/h</span>
            </div>
        </div>

        <button onclick="getBalerWeather()">Refresh Live Data</button>
        <p class="footer-text">Data: WeatherAPI • Auto-Refresh: 1 Hour</p>
    </div>

    <script>
        // --- LOGIC SECTION ---
        const apiKey = "58ba2d5e4a54464f92f51820260203"; 
        const city = "Baler";

        if ("Notification" in window) {
            Notification.requestPermission();
        }

        function triggerNotification(title, message) {
            if (Notification.permission === "granted") {
                new Notification(title, { body: message, tag: 'baler-update' });
            }
        }

        async function getBalerWeather() {
            document.getElementById('dateTime').innerText = "Last update: " + new Date().toLocaleTimeString();
            
            try {
                const response = await fetch(`https://api.weatherapi.com/v1/forecast.json?key=${apiKey}&q=${city}&days=1&aqi=no&alerts=no`);
                
                if (!response.ok) throw new Error("Connection Error");
                
                const data = await response.json();

                const tempC = Math.round(data.current.temp_c);
                const clouds = data.current.cloud;
                const humidity = data.current.humidity;
                const windKph = data.current.wind_kph;
                const condition = data.current.condition.text;
                const moonPhase = data.forecast.forecastday[0].astro.moon_phase;

                let safetyTip = "";
                const lowerCondition = condition.toLowerCase();

                // Logic for Tips
                if (lowerCondition.includes("rain") || lowerCondition.includes("shower") || lowerCondition.includes("drizzle")) {
                    safetyTip = "Rain detected nearby. 🌧️ Check the sky before hitting the surf!";
                } else if (tempC >= 28 && clouds < 40) {
                    safetyTip = "Sunny and warm! ☀️ Excellent for surfing. Use sunscreen!";
                } else if (windKph > 18) {
                    safetyTip = "Breezy conditions. 🚩 Watch for choppy water at Sabang.";
                } else {
                    safetyTip = "Steady Baler weather. Enjoy the tropical vibes! 🌴";
                }

                // Update UI Elements
                document.getElementById('temp').innerText = tempC + "°C";
                document.getElementById('cloudPrediction').innerText = condition;
                document.getElementById('clouds').innerText = clouds + "%";
                document.getElementById('moon').innerText = moonPhase;
                document.getElementById('humidity').innerText = humidity + "%";
                document.getElementById('wind').innerText = windKph + " km/h";
                document.getElementById('tip').innerText = "STATUS: " + safetyTip;

                // Dynamic Theme Logic
                if (lowerCondition.includes("rain")) {
                    document.body.style.background = "#2c3e50"; // Stormy Grey
                } else if (tempC >= 28 && clouds < 40) {
                    document.body.style.background = "#0f4c75"; // Ocean Blue
                } else {
                    document.body.style.background = "#1a1a2e"; // Standard Deep
                }

                triggerNotification(`Baler Update: ${tempC}°C`, safetyTip);

            } catch (err) {
                console.error(err);
                document.getElementById('cloudPrediction').innerText = "API Error";
                document.getElementById('tip').innerText = "Error: Check your API key or connection.";
            }
        }

        // Run immediately
        getBalerWeather();
        
        // Auto-Sync every 1 Hour (3,600,000 ms)
        setInterval(getBalerWeather, 3600000); 
    </script>
</body>
</html>
