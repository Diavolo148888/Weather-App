<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baler Sky & Surf Monitor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        body { 
            min-height: 100vh; display: flex; justify-content: center; align-items: center; 
            color: white; transition: all 1.5s ease; padding: 20px;
            background: #1a1a2e; 
        }

        .container {
            background: rgba(0, 0, 0, 0.4);
            padding: 2rem; border-radius: 35px;
            backdrop-filter: blur(20px);
            box-shadow: 0 15px 50px rgba(0,0,0,0.5);
            width: 100%; max-width: 480px; text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .badge-row { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
        .badge { padding: 6px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; }

        .temp { font-size: 4.5rem; font-weight: 800; margin: 5px 0; letter-spacing: -2px; }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 15px 0; }
        .stat-card { background: rgba(255, 255, 255, 0.1); padding: 12px; border-radius: 20px; }
        .stat-card p { font-size: 0.65rem; opacity: 0.7; text-transform: uppercase; }
        .stat-card span { display: block; font-size: 1rem; font-weight: bold; margin-top: 3px; }

        .tip-box { 
            margin: 15px 0; padding: 15px; background: rgba(255, 255, 255, 0.15); 
            border-radius: 15px; border-left: 6px solid #4ecca3; font-size: 0.85rem; text-align: left;
        }

        button { 
            width: 100%; padding: 14px; border-radius: 50px; border: none; 
            font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 8px;
            text-transform: uppercase; font-size: 0.75rem;
        }

        .btn-main { background: #4ecca3; color: #1a1a2e; }
        .btn-sun { background: #ff9f43; color: white; }

        /* Background Themes */
        .theme-day { background: linear-gradient(180deg, #4facfe 0%, #00f2fe 100%); color: #003366; }
        .theme-sunset { background: linear-gradient(180deg, #ff8c00 0%, #ed4264 100%); }
        .theme-night { background: linear-gradient(180deg, #0f2027 0%, #2c5364 100%); }
        .theme-storm { background: #373b44; animation: flash 2s infinite; }
        @keyframes flash { 0%, 100% { background: #373b44; } 50% { background: #ff4e4e; } }
    </style>
</head>
<body id="mainBody">

    <div class="container">
        <div class="badge-row">
            <div id="surfBadge" class="badge" style="background: #4ecca3;">Surf: Checking...</div>
            <div id="tideBadge" class="badge" style="background: #3498db;">Tide: Estimating...</div>
        </div>
        
        <h1 style="font-size: 1.3rem;">Baler Sky & Surf</h1>
        <p id="timeLabel" style="opacity: 0.7; font-size: 0.7rem;"></p>

        <div id="temp" class="temp">--°C</div>
        <div id="weatherDesc" style="font-weight: bold; font-size: 1.1rem; text-transform: capitalize;">Syncing...</div>
        
        <div class="tip-box" id="tipDisplay">Connecting to OpenWeather...</div>

        <div class="stat-grid">
            <div class="stat-card"><p>Clouds</p><span id="valClouds">--%</span></div>
            <div class="stat-card"><p>Wind</p><span id="valWind">-- km/h</span></div>
            <div class="stat-card"><p>Humidity</p><span id="valHumid">--%</span></div>
            <div class="stat-card"><p>Moon Phase</p><span id="valMoon">--</span></div>
        </div>

        <button class="btn-main" onclick="getBalerWeather()">Manual Refresh</button>
        <button class="btn-sun" onclick="startSunTimer()">Start Sunscreen Timer (2h)</button>
        
        <p style="font-size: 0.6rem; opacity: 0.5; margin-top: 12px;">Auto-Update every 60s</p>
    </div>

    <script>
        const apiKey = "084cee246bd0e5b348128881ea756965"; 
        const city = "Baler,PH";

        if ("Notification" in window) { Notification.requestPermission(); }

        function triggerNotif(title, msg) {
            if (Notification.permission === "granted") {
                new Notification(title, { body: msg, tag: 'baler-alert' });
            }
        }

        function startSunTimer() {
            alert("Timer set! We'll alert you in 2 hours to re-apply sunscreen. 🧴");
            setTimeout(() => {
                triggerNotif("Sunscreen Reminder! 🧴", "2 hours are up! Re-apply to stay safe in the Baler sun.");
            }, 7200000); 
        }

        // --- Restored Moon Phase Logic ---
        function getMoonPhase() {
            const date = new Date();
            const lp = 2551443; 
            const new_moon = new Date(1970, 0, 7, 20, 35, 0);
            const phase = ((date.getTime() - new_moon.getTime()) / 1000) % lp;
            const res = Math.floor((phase / (24 * 3600)) + 1);
            if (res <= 1) return "New Moon 🌑";
            if (res <= 6) return "Waxing Crescent 🌒";
            if (res <= 9) return "First Quarter 🌓";
            if (res <= 13) return "Waxing Gibbous 🌔";
            if (res <= 16) return "Full Moon 🌕";
            if (res <= 21) return "Waning Gibbous 🌖";
            if (res <= 24) return "Last Quarter 🌗";
            return "Waning Crescent 🌘";
        }

        function getTide() {
            const h = new Date().getHours() + (new Date().getMinutes()/60);
            const cycle = h % 12.4; 
            return (cycle < 3.1 || cycle > 9.3) ? 
                { label: "High Tide 🌊", col: "#3498db", tip: "Waves are hitting the Sabang sea wall!" } : 
                { label: "Low Tide 🐚", col: "#f1c40f", tip: "Perfect for a beach walk or learning to surf." };
        }

        function setAppTheme(isStorm) {
            const body = document.getElementById('mainBody');
            body.className = ''; 
            if (isStorm) { body.classList.add('theme-storm'); return; }
            const hr = new Date().getHours();
            if (hr >= 6 && hr < 16) body.classList.add('theme-day');
            else if (hr >= 16 && hr < 19) body.classList.add('theme-sunset');
            else body.classList.add('theme-night');
        }

        async function getBalerWeather() {
            document.getElementById('timeLabel').innerText = "Updated: " + new Date().toLocaleTimeString();
            try {
                const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${apiKey}`);
                const data = await res.json();

                const c = data.clouds.all;
                const t = Math.round(data.main.temp);
                const w = data.wind.speed;
                const hum = data.main.humidity;
                const mainWeather = data.weather[0].main;

                setAppTheme(w > 35 || mainWeather === "Thunderstorm");

                const surfB = document.getElementById('surfBadge');
                if (w < 18 && mainWeather !== "Rain") {
                    surfB.innerText = "Surf: GO 🏄‍♂️"; surfB.style.background = "#2ecc71";
                } else {
                    surfB.innerText = "Surf: CAUTION 🚩"; surfB.style.background = "#e74c3c";
                }

                const tideData = getTide();
                const tideB = document.getElementById('tideBadge');
                tideB.innerText = tideData.label; tideB.style.background = tideData.col;

                document.getElementById('temp').innerText = t + "°C";
                document.getElementById('weatherDesc').innerText = mainWeather + (c > 50 ? " ☁️" : " ☀️");
                document.getElementById('valClouds').innerText = c + "%";
                document.getElementById('valWind').innerText = w + " km/h";
                document.getElementById('valHumid').innerText = hum + "%";
                document.getElementById('valMoon').innerText = getMoonPhase(); // Restored
                
                let safetyMsg = tideData.tip;
                if (c > 80) safetyMsg = "Heavy clouds. Bring an umbrella to the beach! ☂️";
                document.getElementById('tipDisplay').innerText = "TIP: " + safetyMsg;

                triggerNotif(`Baler: ${t}°C`, safetyMsg);

            } catch (err) {
                document.getElementById('weatherDesc').innerText = "Offline";
            }
        }

        getBalerWeather();
        setInterval(getBalerWeather, 60000);
    </script>
</body>
</html>
