<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baler Sky Monitor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #1a1a2e; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: white; padding: 20px; }
        .container { background: rgba(255, 255, 255, 0.1); padding: 2rem; border-radius: 30px; backdrop-filter: blur(20px); width: 100%; max-width: 450px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .temp { font-size: 4rem; font-weight: bold; margin: 5px 0; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .stat-card { background: rgba(0, 0, 0, 0.2); padding: 15px; border-radius: 15px; }
        .tip-box { margin: 20px 0; padding: 15px; background: rgba(255, 255, 255, 0.2); border-radius: 15px; border-left: 5px solid #4ecca3; font-size: 0.9rem; }
        button { width: 100%; padding: 15px; border-radius: 50px; border: none; background: #4ecca3; color: white; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .test-btn { background: #6c757d; font-size: 0.8rem; padding: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Baler, Aurora</h1>
        <p id="dateTime" style="opacity: 0.7; font-size: 0.8rem;"></p>
        <div id="temp" class="temp">--°C</div>
        <div id="cloudPrediction" style="font-weight: bold; color: #4ecca3;">Connecting...</div>
        <div class="tip-box" id="tip">Waiting...</div>

        <div class="stat-grid">
            <div class="stat-card"><p>Clouds</p><span id="clouds">--%</span></div>
            <div class="stat-card"><p>Humidity</p><span id="humidity">--%</span></div>
        </div>

        <button onclick="getBalerWeather()">Refresh Weather</button>
        <button class="test-btn" onclick="sendManualTest()">Click to Test Notification</button>
        <p style="font-size: 0.7rem; opacity: 0.5;">Auto-refresh: 1 Minute</p>
    </div>

    <script>
        const apiKey = "084cee246bd0e5b348128881ea756965"; 
        const city = "Baler,PH";

        // 1. Force Request on Click
        function sendManualTest() {
            if (!("Notification" in window)) {
                alert("This browser does not support notifications.");
                return;
            }
            Notification.requestPermission().then(permission => {
                if (permission === "granted") {
                    new Notification("Test Working! ✅", { body: "If you see this, your phone is ready for weather alerts." });
                } else {
                    alert("Permission denied. Check your phone settings.");
                }
            });
        }

        function triggerNotification(title, message) {
            if (window.Notification && Notification.permission === "granted") {
                new Notification(title, { body: message, tag: 'baler-weather' });
            }
        }

        async function getBalerWeather() {
            document.getElementById('dateTime').innerText = new Date().toLocaleTimeString();
            try {
                const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${apiKey}`);
                const data = await response.json();
                
                const clouds = data.clouds.all;
                const temp = Math.round(data.main.temp);
                const desc = data.weather[0].main;
                
                let prediction = (clouds > 80 || desc === "Rain") ? "Rainy 🌧️" : (clouds < 20 ? "Sunny ☀️" : "Cloudy 🌤️");
                let tip = (clouds > 80) ? "Bring umbrella!" : "Stay safe!";

                document.getElementById('temp').innerText = temp + "°C";
                document.getElementById('cloudPrediction').innerText = prediction;
                document.getElementById('clouds').innerText = clouds + "%";
                document.getElementById('humidity').innerText = data.main.humidity + "%";
                document.getElementById('tip').innerText = tip;

                triggerNotification(`Baler: ${temp}°C`, tip);
            } catch (e) {
                document.getElementById('cloudPrediction').innerText = "Sync Error";
            }
        }

        // Initial Start
        getBalerWeather();
        setInterval(getBalerWeather, 60000);
    </script>
</body>
</html>
